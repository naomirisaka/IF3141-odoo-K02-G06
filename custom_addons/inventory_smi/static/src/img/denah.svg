<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" width="800" height="520" id="smi-denah-svg">

  <!-- Floor background -->
  <rect x="0" y="0" width="800" height="520" fill="#F8FAFC"/>

  <!-- Title -->
  <text x="400" y="17" font-family="Inter, system-ui, sans-serif" font-size="11"
        fill="#64748B" text-anchor="middle" font-weight="600" letter-spacing="0.3">
    CV Dunia Offset Printing — Denah Lantai Produksi
  </text>

  <!-- ===== OUTER WALL — L-shaped building ===== -->
  <!-- Main body: x=20..640, y=24..498  Right wing: x=640..785, y=24..295 -->
  <polygon points="20,24 785,24 785,295 640,295 640,498 20,498"
           fill="#FFFFFF" stroke="#334155" stroke-width="3" stroke-linejoin="round"/>

  <!-- ===== INTERIOR WALL LINES ===== -->

  <!-- Horizontal: cetak area / proses area -->
  <line x1="20" y1="188" x2="640" y2="188" stroke="#94A3B8" stroke-width="2"/>
  <!-- Horizontal: proses area / finishing area -->
  <line x1="20" y1="358" x2="640" y2="358" stroke="#94A3B8" stroke-width="2"/>

  <!-- Vertical in cetak row: split MC1 / MC2 -->
  <line x1="345" y1="24" x2="345" y2="188" stroke="#CBD5E1" stroke-width="1.5" stroke-dasharray="6,4"/>

  <!-- Vertical in proses row: laminasi | pond | QC -->
  <line x1="238" y1="188" x2="238" y2="358" stroke="#CBD5E1" stroke-width="1.5" stroke-dasharray="6,4"/>
  <line x1="430" y1="188" x2="430" y2="358" stroke="#CBD5E1" stroke-width="1.5" stroke-dasharray="6,4"/>

  <!-- Vertical in finishing row: foil | meja | finishing -->
  <line x1="238" y1="358" x2="238" y2="498" stroke="#CBD5E1" stroke-width="1.5" stroke-dasharray="6,4"/>
  <line x1="430" y1="358" x2="430" y2="498" stroke="#CBD5E1" stroke-width="1.5" stroke-dasharray="6,4"/>

  <!-- Right wing interior: storage shelf line -->
  <line x1="640" y1="170" x2="785" y2="170" stroke="#CBD5E1" stroke-width="1.5" stroke-dasharray="4,4"/>

  <!-- ===== MACHINES &amp; AREAS (non-interactive landmarks) ===== -->

  <!-- Mesin Cetak 1 — top left -->
  <rect x="38" y="42" width="280" height="122" fill="#E2E8F0" stroke="#94A3B8" stroke-width="1.5" rx="8"/>
  <!-- machine body detail -->
  <rect x="50" y="54" width="256" height="90" fill="#D1D5DB" stroke="none" rx="4"/>
  <rect x="58" y="62" width="240" height="74" fill="#E2E8F0" stroke="none" rx="3"/>
  <text x="178" y="97" font-family="Inter, system-ui, sans-serif" font-size="13"
        fill="#374151" text-anchor="middle" font-weight="700">Mesin Cetak 1</text>
  <text x="178" y="114" font-family="Inter, system-ui, sans-serif" font-size="10"
        fill="#6B7280" text-anchor="middle">Offset Printing · UV</text>

  <!-- Mesin Cetak 2 — top right (of left wing) -->
  <rect x="362" y="42" width="258" height="122" fill="#E2E8F0" stroke="#94A3B8" stroke-width="1.5" rx="8"/>
  <rect x="374" y="54" width="234" height="90" fill="#D1D5DB" stroke="none" rx="4"/>
  <rect x="382" y="62" width="218" height="74" fill="#E2E8F0" stroke="none" rx="3"/>
  <text x="491" y="97" font-family="Inter, system-ui, sans-serif" font-size="13"
        fill="#374151" text-anchor="middle" font-weight="700">Mesin Cetak 2</text>
  <text x="491" y="114" font-family="Inter, system-ui, sans-serif" font-size="10"
        fill="#6B7280" text-anchor="middle">Offset Printing · UV</text>

  <!-- Area Penyimpanan — right wing (top shelf) -->
  <rect x="653" y="34" width="120" height="120" fill="#EFF6FF" stroke="#93C5FD" stroke-width="1.5" rx="8"/>
  <text x="713" y="89" font-family="Inter, system-ui, sans-serif" font-size="12"
        fill="#2563EB" text-anchor="middle" font-weight="700">Gudang</text>
  <text x="713" y="107" font-family="Inter, system-ui, sans-serif" font-size="10"
        fill="#93C5FD" text-anchor="middle">Rak Bahan A</text>

  <!-- Area Penyimpanan — right wing (bottom shelf) -->
  <rect x="653" y="182" width="120" height="102" fill="#EFF6FF" stroke="#93C5FD" stroke-width="1.5" rx="8"/>
  <text x="713" y="228" font-family="Inter, system-ui, sans-serif" font-size="12"
        fill="#2563EB" text-anchor="middle" font-weight="700">Gudang</text>
  <text x="713" y="246" font-family="Inter, system-ui, sans-serif" font-size="10"
        fill="#93C5FD" text-anchor="middle">Rak Bahan B</text>

  <!-- Mesin Laminasi — middle left -->
  <rect x="38" y="204" width="178" height="130" fill="#E2E8F0" stroke="#94A3B8" stroke-width="1.5" rx="8"/>
  <rect x="50" y="216" width="154" height="90" fill="#D1D5DB" stroke="none" rx="4"/>
  <text x="127" y="270" font-family="Inter, system-ui, sans-serif" font-size="12"
        fill="#374151" text-anchor="middle" font-weight="700">Mesin Laminasi</text>
  <text x="127" y="287" font-family="Inter, system-ui, sans-serif" font-size="10"
        fill="#6B7280" text-anchor="middle">Hot / Cold</text>

  <!-- Mesin Pond — middle center -->
  <rect x="252" y="204" width="156" height="130" fill="#E2E8F0" stroke="#94A3B8" stroke-width="1.5" rx="8"/>
  <rect x="264" y="216" width="132" height="90" fill="#D1D5DB" stroke="none" rx="4"/>
  <text x="330" y="270" font-family="Inter, system-ui, sans-serif" font-size="12"
        fill="#374151" text-anchor="middle" font-weight="700">Mesin Pond</text>
  <text x="330" y="287" font-family="Inter, system-ui, sans-serif" font-size="10"
        fill="#6B7280" text-anchor="middle">Die Cutting</text>

  <!-- Area QC — middle right -->
  <rect x="444" y="204" width="178" height="130" fill="#F0FDF4" stroke="#86EFAC" stroke-width="1.5" rx="8"/>
  <text x="533" y="264" font-family="Inter, system-ui, sans-serif" font-size="12"
        fill="#16A34A" text-anchor="middle" font-weight="700">Area QC</text>
  <text x="533" y="281" font-family="Inter, system-ui, sans-serif" font-size="10"
        fill="#86EFAC" text-anchor="middle">Quality Control</text>

  <!-- Mesin Foil — bottom left -->
  <rect x="38" y="374" width="178" height="104" fill="#E2E8F0" stroke="#94A3B8" stroke-width="1.5" rx="8"/>
  <rect x="50" y="386" width="154" height="70" fill="#D1D5DB" stroke="none" rx="4"/>
  <text x="127" y="424" font-family="Inter, system-ui, sans-serif" font-size="12"
        fill="#374151" text-anchor="middle" font-weight="700">Mesin Foil</text>
  <text x="127" y="441" font-family="Inter, system-ui, sans-serif" font-size="10"
        fill="#6B7280" text-anchor="middle">Hot Stamping</text>

  <!-- Meja Persiapan — bottom center -->
  <rect x="252" y="374" width="156" height="104" fill="#E2E8F0" stroke="#94A3B8" stroke-width="1.5" rx="8"/>
  <text x="330" y="424" font-family="Inter, system-ui, sans-serif" font-size="12"
        fill="#374151" text-anchor="middle" font-weight="700">Meja Persiapan</text>
  <text x="330" y="441" font-family="Inter, system-ui, sans-serif" font-size="10"
        fill="#6B7280" text-anchor="middle">Pre-press</text>

  <!-- Area Finishing — bottom right -->
  <rect x="444" y="374" width="178" height="104" fill="#FFF7ED" stroke="#FCD34D" stroke-width="1.5" rx="8"/>
  <text x="533" y="424" font-family="Inter, system-ui, sans-serif" font-size="12"
        fill="#92400E" text-anchor="middle" font-weight="700">Area Finishing</text>
  <text x="533" y="441" font-family="Inter, system-ui, sans-serif" font-size="10"
        fill="#FCD34D" text-anchor="middle">Packaging</text>

  <!-- ===== AREA ROW LABELS ===== -->
  <text x="27" y="184" font-family="Inter, system-ui, sans-serif" font-size="9"
        fill="#94A3B8" font-weight="500">AREA CETAK</text>
  <text x="27" y="354" font-family="Inter, system-ui, sans-serif" font-size="9"
        fill="#94A3B8" font-weight="500">AREA PROSES</text>
  <text x="27" y="494" font-family="Inter, system-ui, sans-serif" font-size="9"
        fill="#94A3B8" font-weight="500">AREA FINISHING</text>

  <!-- ===== DOOR INDICATORS ===== -->
  <!-- Main entrance (bottom center) -->
  <rect x="295" y="493" width="70" height="5" fill="#3B82F6" rx="2"/>
  <text x="330" y="513" font-family="Inter, system-ui, sans-serif" font-size="9"
        fill="#3B82F6" text-anchor="middle" font-weight="600">PINTU MASUK</text>

  <!-- Side door (right wing) -->
  <rect x="780" y="208" width="5" height="50" fill="#3B82F6" rx="2"/>

  <!-- ===== CORRIDOR ARROWS (flow indicators) ===== -->
  <text x="644" y="310" font-family="Inter, system-ui, sans-serif" font-size="20"
        fill="#CBD5E1" text-anchor="middle">↑</text>
  <text x="644" y="460" font-family="Inter, system-ui, sans-serif" font-size="10"
        fill="#CBD5E1" text-anchor="middle" font-weight="500">KORIDOR</text>

  <!-- ===== LEGEND ===== -->
  <rect x="450" y="484" width="12" height="12" fill="#10B981" rx="6"/>
  <text x="468" y="495" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#64748B">Aman</text>

  <rect x="510" y="484" width="12" height="12" fill="#F59E0B" rx="6"/>
  <text x="528" y="495" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#64748B">Sisa Sedikit</text>

  <rect x="598" y="484" width="12" height="12" fill="#EF4444" rx="6"/>
  <text x="616" y="495" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#64748B">Habis</text>

  <!-- ===== INVENTORY POINT OVERLAY LAYER (populated by MapWidget.js) ===== -->
  <g id="smi-inventory-points-layer"/>
  <g id="smi-tooltip-layer"/>
</svg>
