<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500" id="smi-denah-svg">
  <!-- Background / floor -->
  <rect x="0" y="0" width="800" height="500" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="3" rx="4"/>

  <!-- Title -->
  <text x="400" y="22" font-family="Inter, system-ui, sans-serif" font-size="13"
        fill="#64748B" text-anchor="middle" font-weight="600">CV Dunia Offset Printing — Denah Lantai Produksi</text>

  <!-- ===== MACHINES (non-interactive landmarks) ===== -->

  <!-- Mesin Cetak 1 -->
  <rect x="40" y="50" width="160" height="90" fill="#E2E8F0" stroke="#94A3B8" stroke-width="1.5" rx="6"/>
  <text x="120" y="91" font-family="Inter, system-ui, sans-serif" font-size="12"
        fill="#475569" text-anchor="middle" font-weight="600">Mesin Cetak 1</text>
  <text x="120" y="110" font-family="Inter, system-ui, sans-serif" font-size="10"
        fill="#94A3B8" text-anchor="middle">Offset Printing</text>

  <!-- Mesin Cetak 2 -->
  <rect x="240" y="50" width="160" height="90" fill="#E2E8F0" stroke="#94A3B8" stroke-width="1.5" rx="6"/>
  <text x="320" y="91" font-family="Inter, system-ui, sans-serif" font-size="12"
        fill="#475569" text-anchor="middle" font-weight="600">Mesin Cetak 2</text>
  <text x="320" y="110" font-family="Inter, system-ui, sans-serif" font-size="10"
        fill="#94A3B8" text-anchor="middle">Offset Printing</text>

  <!-- Mesin Laminasi -->
  <rect x="40" y="190" width="150" height="80" fill="#E2E8F0" stroke="#94A3B8" stroke-width="1.5" rx="6"/>
  <text x="115" y="226" font-family="Inter, system-ui, sans-serif" font-size="12"
        fill="#475569" text-anchor="middle" font-weight="600">Mesin Laminasi</text>
  <text x="115" y="244" font-family="Inter, system-ui, sans-serif" font-size="10"
        fill="#94A3B8" text-anchor="middle">Hot / Cold</text>

  <!-- Mesin Pond -->
  <rect x="40" y="330" width="150" height="80" fill="#E2E8F0" stroke="#94A3B8" stroke-width="1.5" rx="6"/>
  <text x="115" y="366" font-family="Inter, system-ui, sans-serif" font-size="12"
        fill="#475569" text-anchor="middle" font-weight="600">Mesin Pond</text>
  <text x="115" y="384" font-family="Inter, system-ui, sans-serif" font-size="10"
        fill="#94A3B8" text-anchor="middle">Die Cutting</text>

  <!-- Mesin Foil -->
  <rect x="240" y="330" width="150" height="80" fill="#E2E8F0" stroke="#94A3B8" stroke-width="1.5" rx="6"/>
  <text x="315" y="366" font-family="Inter, system-ui, sans-serif" font-size="12"
        fill="#475569" text-anchor="middle" font-weight="600">Mesin Foil</text>
  <text x="315" y="384" font-family="Inter, system-ui, sans-serif" font-size="10"
        fill="#94A3B8" text-anchor="middle">Hot Stamping</text>

  <!-- Area Penyimpanan -->
  <rect x="570" y="50" width="195" height="150" fill="#EFF6FF" stroke="#93C5FD" stroke-width="1.5" rx="6"/>
  <text x="667" y="121" font-family="Inter, system-ui, sans-serif" font-size="12"
        fill="#3B82F6" text-anchor="middle" font-weight="600">Area Penyimpanan</text>
  <text x="667" y="140" font-family="Inter, system-ui, sans-serif" font-size="10"
        fill="#93C5FD" text-anchor="middle">Gudang Bahan</text>

  <!-- Area Finishing -->
  <rect x="450" y="330" width="160" height="80" fill="#E2E8F0" stroke="#94A3B8" stroke-width="1.5" rx="6"/>
  <text x="530" y="366" font-family="Inter, system-ui, sans-serif" font-size="12"
        fill="#475569" text-anchor="middle" font-weight="600">Area Finishing</text>
  <text x="530" y="384" font-family="Inter, system-ui, sans-serif" font-size="10"
        fill="#94A3B8" text-anchor="middle">Packaging</text>

  <!-- Area QC -->
  <rect x="450" y="190" width="140" height="80" fill="#E2E8F0" stroke="#94A3B8" stroke-width="1.5" rx="6"/>
  <text x="520" y="226" font-family="Inter, system-ui, sans-serif" font-size="12"
        fill="#475569" text-anchor="middle" font-weight="600">Area QC</text>
  <text x="520" y="244" font-family="Inter, system-ui, sans-serif" font-size="10"
        fill="#94A3B8" text-anchor="middle">Quality Control</text>

  <!-- ===== WALKWAYS / CORRIDORS ===== -->
  <line x1="215" y1="50" x2="215" y2="450" stroke="#E2E8F0" stroke-width="2" stroke-dasharray="6,4"/>
  <line x1="430" y1="50" x2="430" y2="450" stroke="#E2E8F0" stroke-width="2" stroke-dasharray="6,4"/>
  <line x1="40" y1="160" x2="765" y2="160" stroke="#E2E8F0" stroke-width="2" stroke-dasharray="6,4"/>
  <line x1="40" y1="295" x2="765" y2="295" stroke="#E2E8F0" stroke-width="2" stroke-dasharray="6,4"/>

  <!-- ===== LEGEND ===== -->
  <rect x="620" y="440" width="12" height="12" fill="#10B981" rx="6"/>
  <text x="638" y="451" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#64748B">Aman</text>
  <rect x="690" y="440" width="12" height="12" fill="#F59E0B" rx="6"/>
  <text x="708" y="451" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#64748B">Sedikit</text>
  <rect x="755" y="440" width="12" height="12" fill="#EF4444" rx="6"/>
  <text x="773" y="451" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#64748B">Habis</text>

  <!-- ===== INVENTORY POINT OVERLAY LAYER (populated by MapWidget.js) ===== -->
  <g id="smi-inventory-points-layer"/>
  <g id="smi-tooltip-layer"/>
</svg>
