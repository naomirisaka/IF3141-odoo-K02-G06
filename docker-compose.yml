version: '3.8'

services:
  web:
    build:
      context: .
      dockerfile: docker/web.Dockerfile
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8069:8069"
    volumes:
      - ./config:/etc/odoo
      - ./custom_addons:/mnt/extras-addons
      - odoo-web-data:/var/lib/odoo
    command: >
      odoo
      --db_host=db
      --db_port=5432
      --db_user=odoo
      --db_password=password

  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=postgres
      - POSTGRES_PASSWORD=password
      - POSTGRES_USER=odoo
    volumes:
      - odoo-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U odoo -d postgres || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  alpine:
    image: alpine:latest
    depends_on:
      - db
      - web
    tty: true
    volumes:
      - odoo-web-data:/var/lib/odoo
      - ./dump:/backup

volumes:
  odoo-web-data:
    name: odoo-web-data
  odoo-db-data:
    name: odoo-db-data